[mcu H36_combo]
#serial: /dev/serial/by-path/*
# serial: /dev/serial/by-id/usb-Klipper_stm32g431xx_2B0030000C50475531373820-if00
canbus_uuid=b503df1a443c
canbus_interface: can0

# [mcu scanner1]
# #serial: /dev/serial/by-id/usb-Klipper_stm32f407xx_4E0045001851343232333435-if00 
# serial: /dev/serial/by-id/usb-Cartographer_614e_1F000B000F43304146393320-if00

# [mcu scanner2]
# #serial: /dev/serial/by-id/usb-Klipper_stm32f407xx_4E0045001851343232333435-if00
# serial: /dev/serial/by-id/usb-Cartographer_614e_1F001D000F43304146393320-if00

[extruder]
step_pin: H36_combo:PB9 
dir_pin: H36_combo:PC15
enable_pin: !H36_combo:PC14

##  Update value below when you perform extruder calibration
##  If you ask for 100mm of filament, but in reality it is 98mm:
##  rotation_distance = <previous_rotation_distance> * <actual_extrude_distance> / 100
##  22.6789511 is a good starting point for Bondtech 5mm gears
##  34.37086 for Bondtech 8mm gears (Galileo)
rotation_distance: 4.45   #22.6789511   #Bondtech 5mm Drive Gears
##  Update Gear Ratio depending on your Extruder Type
##  Use 50:17 for Afterburner/Clockwork (BMG Gear Ratio)
##  Use 80:20 for M4, M3.1
##  Use 7.5:1 for Galileo
##  gear_ratio: 50:10               #for Stealthburner/Clockwork2 BMG Gear Ratio
microsteps: 16
full_steps_per_rotation: 200    #200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.75
heater_pin: H36_combo: PB13 
pullup_resistor: 2200
## Check what thermistor type you have. See https://www.klipper3d.org/Config_Reference.html#common-thermistors for common thermistor types.
## Use "Generic 3950" for NTC 100k 3950 thermistors
sensor_type: Generic 3950
sensor_pin: H36_combo:PA3 
min_temp: -273.15 #1 #-273.15 
max_temp: 360 #360 
max_power: 1.0
min_extrude_temp: -273
control = pid
pid_kp = 26.213
pid_ki = 1.304
pid_kd = 131.721
##  Try to keep pressure_advance below 1.0
#pressure_advance: 0.02 #0.05
##  Default is 0.040, leave stock
#pressure_advance_smooth_time: 0.040
max_extrude_cross_section: 5000.0

[tmc2209 extruder]
uart_pin: H36_combo:PB6
interpolate: false
run_current: 0.7
sense_resistor: 0.110
stealthchop_threshold: 0
#diag_pin: H36_combo:PC15

[adxl345]
cs_pin: H36_combo:PA4
spi_software_sclk_pin: H36_combo:PA5
spi_software_mosi_pin: H36_combo:PA7
spi_software_miso_pin: H36_combo:PA6
axes_map: -y,z,-x

[resonance_tester]
accel_chip: adxl345
probe_points:
    300,300,30 # an example

#####################################################################
#     SB FANS
#####################################################################

[fan_generic h36fan0]
pin: H36_combo:PB12
#pin: H36_combo:PA9
max_power:1.0
shutdown_speed:0.0
cycle_time:0.5
hardware_pwm:false
kick_start_time:0.10
off_below:0.1
tachometer_pin: H36_combo:PB14

# [filament_switch_sensor h36fan0tach_fan0]
# switch_pin: ^!H36_combo:PB14


[fan_generic h36fan1]
pin: H36_combo:PB2
max_power:1.0
shutdown_speed:0.0
cycle_time:0.5
hardware_pwm:false
kick_start_time:0.10
off_below:0.1
tachometer_pin: H36_combo:PB1

# [filament_switch_sensor h36fan1tach_fan1]
# switch_pin: ^!H36_combo:PB1

[fan_generic h36fan2]
pin: H36_combo:PB0
max_power:1.0
shutdown_speed:0.0
cycle_time:0.5
hardware_pwm:false
kick_start_time:0.10
off_below:0.1

[fan_generic h36fan3]
pin: H36_combo:PB15
max_power:1.0
shutdown_speed:0.0
cycle_time:0.5
hardware_pwm:false
kick_start_time:0.10
off_below:0.1
tachometer_pin:H36_combo:PA8
#tachometer_ppr:
#tachometer_poll_interval:

# [filament_switch_sensor h36fan3tach_fan3]
