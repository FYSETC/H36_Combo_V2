[gcode_macro HTEST_ACTION_BEGIN]
gcode:
    # fan
    SET_FAN_SPEED FAN=h36fan0 SPEED=1.0
    SET_FAN_SPEED FAN=h36fan1 SPEED=1.0
    SET_FAN_SPEED FAN=h36fan2 SPEED=1.0
    SET_FAN_SPEED FAN=h36fan3 SPEED=1.0
    
	SET_PIN PIN=h36io0 VALUE=1.0
	SET_PIN PIN=h36io1 VALUE=1.0
	SET_PIN PIN=h36io2 VALUE=1.0
	SET_PIN PIN=h36io3 VALUE=1.0
	SET_PIN PIN=h36io4 VALUE=1.0
	
	SET_PIN PIN=h36pa14 VALUE=1.0
	SET_PIN PIN=h36pb11 VALUE=1.0
	SET_PIN PIN=h36pb10 VALUE=1.0
	SET_PIN PIN=h36pa13 VALUE=1.0
	SET_PIN PIN=h36pa15 VALUE=1.0
	SET_PIN PIN=h36pb7 VALUE=1.0
	SET_PIN PIN=h36pa1 VALUE=1.0
	ACCELEROMETER_QUERY CHIP=adxl345
	FORCE_MOVE STEPPER=extruder DISTANCE=10 VELOCITY=20
	FORCE_MOVE STEPPER=extruder DISTANCE=-10 VELOCITY=20
	
	SET_HEATER_TEMPERATURE HEATER=extruder TARGET=250
    
	
[gcode_macro HTEST_ACTION_END]
gcode:
    # fan
    SET_FAN_SPEED FAN=h36fan0 SPEED=0
    SET_FAN_SPEED FAN=h36fan1 SPEED=0
    SET_FAN_SPEED FAN=h36fan2 SPEED=0
    SET_FAN_SPEED FAN=h36fan3 SPEED=0
    
	SET_PIN PIN=h36io0 VALUE=0
	SET_PIN PIN=h36io1 VALUE=0
	SET_PIN PIN=h36io2 VALUE=0
	SET_PIN PIN=h36io3 VALUE=0
	SET_PIN PIN=h36io4 VALUE=0
	
	SET_PIN PIN=h36pa14 VALUE=0
	SET_PIN PIN=h36pb11 VALUE=0
	SET_PIN PIN=h36pb10 VALUE=0
	SET_PIN PIN=h36pa13 VALUE=0
	SET_PIN PIN=h36pa15 VALUE=0
	SET_PIN PIN=h36pb7 VALUE=0
